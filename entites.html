<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mythologia — Entités Fantastiques</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bleu-nuit: #0a1520;
    --violet-ae: #6b3fa0;
    --eclat-ae:  #a78bfa;
    --foudre:    #60c0ff;
    --or-ae:     #c9a84c;
    --blanc-lune:#e8e4f0;
    /* aliases pour le JS existant */
    --bg-deep:       #0a1520;
    --bg-panel:      #0d1b2e;
    --bg-card:       #0d1b2e;
    --border:        rgba(167,139,250,0.15);
    --border-gold:   rgba(201,168,76,0.25);
    --ae-purple:     #a78bfa;
    --ae-purple-dim: rgba(167,139,250,0.1);
    --gold:          #c9a84c;
    --gold-dim:      rgba(201,168,76,0.1);
    --text-primary:  #e8e4f0;
    --text-secondary:rgba(232,228,240,0.75);
    --text-muted:    rgba(167,139,250,0.5);
    --danger:        #e05252;
    --warning:       #e0a070;
    --success:       #7acfa8;
    --info:          #60c0ff;
    --cinzel:   'Cinzel', serif;
    --garamond: 'EB Garamond', serif;
  }

* { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bleu-nuit);
    color: var(--blanc-lune);
    font-family: 'EB Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* CANVAS ÉTOILES */
  #starCanvas { position:fixed; inset:0; z-index:0; }

  /* OVERLAY */
  .overlay { position:fixed; inset:0; background:radial-gradient(ellipse at center,rgba(10,21,32,0.3) 0%,rgba(10,21,32,0.85) 100%); z-index:1; }

  /* NAV */
  nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; gap:20px; padding:18px 36px; background:linear-gradient(180deg,rgba(10,21,32,0.95) 0%,transparent 100%); }
  .nav-back { font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.3em; color:var(--eclat-ae); text-decoration:none; text-transform:uppercase; opacity:0.7; transition:opacity 0.2s; }
  .nav-back:hover { opacity:1; }
  .nav-sep { color:rgba(167,139,250,0.3); }
  .nav-current { font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--blanc-lune); }

  /* PAGE */
  .page { position:relative; z-index:10; min-height:100vh; display:flex; flex-direction:column; }

/* ── Header ── */
/* EN-TÊTE */
  .page-header { text-align:center; padding:100px 20px 30px; animation:fadeDown 1s ease both; }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  .page-header h1 { font-family:'Cinzel Decorative',serif; font-size:clamp(1.8rem,4vw,3rem); color:var(--blanc-lune); text-shadow:0 0 40px rgba(167,139,250,0.5),0 0 80px rgba(167,139,250,0.2); letter-spacing:0.1em; margin-bottom:10px; }
  .sous-titre { font-family:'Cinzel',serif; font-size:0.75rem; letter-spacing:0.5em; color:var(--eclat-ae); text-transform:uppercase; opacity:0.7; }
  .ornement { display:flex; align-items:center; gap:16px; margin:18px auto 0; width:min(400px,80vw); }
  .ornement-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--eclat-ae),transparent); }
  .ornement-gem  { width:7px; height:7px; background:var(--eclat-ae); transform:rotate(45deg); box-shadow:0 0 10px var(--eclat-ae); flex-shrink:0; }
  .ornement-gem-s{ width:4px; height:4px; background:var(--eclat-ae); transform:rotate(45deg); opacity:0.5; flex-shrink:0; }

/* STATS SUMMARY */
  .stats-summary { display:flex; gap:24px; justify-content:center; flex-wrap:wrap; padding:18px 20px 30px; }
  .stat-item-s { text-align:center; }
  .stat-num-s { font-family:'Cinzel',serif; font-size:1.6rem; color:var(--eclat-ae); display:block; line-height:1; text-shadow:0 0 20px rgba(167,139,250,0.4); }
  .stat-lbl-s { font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:0.25em; color:rgba(167,139,250,0.5); text-transform:uppercase; }

/* CORPUS TABS */
  .corpus-wrap { padding:0 36px; max-width:1400px; margin:30px auto 0; width:100%; position:relative; z-index:10; animation:fadeIn 1.2s 0.3s ease both; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .corpus-nav { display:flex; flex-wrap:wrap; gap:4px; border-bottom:1px solid rgba(167,139,250,0.15); }
  .corpus-tab { font-family:'Cinzel',serif; font-size:0.63rem; letter-spacing:0.18em; text-transform:uppercase; padding:8px 14px; border:1px solid transparent; border-bottom:none; background:transparent; color:rgba(167,139,250,0.45); cursor:pointer; transition:all 0.2s; border-radius:4px 4px 0 0; position:relative; top:1px; }
  .corpus-tab:hover { color:var(--blanc-lune); border-color:rgba(167,139,250,0.2); }
  .corpus-tab.active { color:var(--or-ae); border-color:rgba(167,139,250,0.2); background:rgba(13,27,42,0.85); border-bottom-color:rgba(13,27,42,0.85); }
  .corpus-tab .tab-emoji { margin-right:4px; }
  .corpus-tab .tab-count { font-size:0.52rem; color:var(--eclat-ae); margin-left:4px; opacity:0.7; }

/* MAIN LAYOUT */
  .corpus-layout { display:grid; grid-template-columns:290px 1fr; gap:0; flex:1; padding:0 36px 60px; max-width:1400px; margin:0 auto; width:100%; animation:fadeIn 1.2s 0.5s ease both; }
  @media(max-width:900px){ .corpus-layout{grid-template-columns:1fr} .corpus-wrap,.corpus-layout{padding-left:16px;padding-right:16px} nav{padding:14px 20px} }

  /* ENTITY LIST */
  .entity-list { border-right:1px solid rgba(167,139,250,0.1); display:flex; flex-direction:column; padding-top:18px; }
  .entity-list-header { display:flex; justify-content:space-between; align-items:center; margin:0 14px 6px; }
  .entity-list-header span { font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:0.3em; text-transform:uppercase; color:rgba(167,139,250,0.4); }
  .entity-list-search { margin:0 14px 10px; padding:8px 12px; background:rgba(13,27,42,0.6); border:1px solid rgba(167,139,250,0.15); border-radius:8px; color:var(--blanc-lune); font-family:'EB Garamond',serif; font-size:0.9rem; font-style:italic; outline:none; width:calc(100% - 28px); transition:border-color 0.2s; }
  .entity-list-search::placeholder { color:rgba(167,139,250,0.35); }
  .entity-list-search:focus { border-color:rgba(167,139,250,0.4); }
  .entity-list-body-wrap { overflow-y:auto; flex:1; max-height:calc(100vh - 280px); }
  .entity-list-body-wrap::-webkit-scrollbar { width:3px; }
  .entity-list-body-wrap::-webkit-scrollbar-thumb { background:rgba(167,139,250,0.2); border-radius:2px; }
  .entity-btn { width:100%; text-align:left; padding:10px 14px; background:transparent; border:none; border-bottom:1px solid rgba(167,139,250,0.06); color:rgba(232,228,240,0.6); cursor:pointer; display:flex; align-items:center; gap:10px; transition:all 0.18s; font-family:'EB Garamond',serif; font-size:0.92rem; }
  .entity-btn:hover { background:rgba(107,63,160,0.08); color:var(--blanc-lune); }
  .entity-btn.active { background:rgba(107,63,160,0.12); color:var(--eclat-ae); border-left:2px solid var(--eclat-ae); padding-left:12px; }
  .entity-btn .e-icon { font-size:0.9rem; opacity:0.8; flex-shrink:0; }
  .entity-btn .e-type-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; margin-left:auto; }

/* FICHE */
  .entity-fiche { display:flex; flex-direction:column; animation:slideIn 0.4s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
  .info-panel-wrap { padding:20px 28px; display:flex; flex-direction:column; overflow-y:auto; max-height:calc(100vh - 220px); }
  .info-panel-wrap::-webkit-scrollbar { width:3px; }
  .info-panel-wrap::-webkit-scrollbar-thumb { background:rgba(167,139,250,0.2); border-radius:2px; }
  .fiche-header { display:flex; align-items:flex-start; gap:16px; margin-bottom:14px; }
  .fiche-icon-box { width:52px; height:52px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.5rem; flex-shrink:0; background:rgba(107,63,160,0.15); border:1px solid rgba(167,139,250,0.2); }
  .fiche-title { display:flex; flex-direction:column; gap:4px; flex:1; }
  .fiche-name { font-family:'Cinzel Decorative',serif; font-size:1.15rem; color:var(--blanc-lune); line-height:1.2; }
  .fiche-contrepartie { font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--eclat-ae); opacity:0.7; }
  .fiche-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
  .fiche-tag { font-family:'Cinzel',serif; font-size:0.53rem; letter-spacing:0.1em; text-transform:uppercase; padding:3px 9px; border-radius:3px; }
  .tag-type { background:rgba(107,63,160,0.15); border:1px solid rgba(167,139,250,0.25); color:var(--eclat-ae); }
  .tag-corpus { background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.3); color:var(--or-ae); }
  .tag-res { background:rgba(96,192,255,0.08); border:1px solid rgba(96,192,255,0.25); color:var(--foudre); }
  .fiche-meta-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
  .fiche-meta-item { background:rgba(13,27,42,0.6); border:1px solid rgba(167,139,250,0.12); border-radius:10px; padding:10px 12px; }
  .fiche-meta-label { font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--eclat-ae); opacity:0.65; margin-bottom:4px; display:block; }
  .fiche-meta-value { font-size:0.88rem; color:var(--blanc-lune); line-height:1.4; }

/* SECTIONS */
  .fiche-sections { padding:0; }
  .fiche-section { margin-bottom:14px; }
  .section-title { font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--eclat-ae); opacity:0.7; margin-bottom:6px; display:flex; align-items:center; gap:10px; }
  .section-title::after { content:''; flex:1; height:1px; background:rgba(167,139,250,0.12); }
  .fiche-text { font-size:0.92rem; line-height:1.8; color:rgba(232,228,240,0.78); }
  .fiche-text em { color:var(--blanc-lune); font-style:italic; }

  /* ORDRE */
  .ordre-block { background:rgba(13,27,42,0.6); border:1px solid rgba(167,139,250,0.12); border-radius:10px; overflow:hidden; }
  .ordre-header { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid rgba(167,139,250,0.1); background:rgba(6,10,20,0.4); }
  .ordre-logo { font-size:1rem; }
  .ordre-title { font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--or-ae); flex:1; }
  .ordre-statut-badge { font-family:'Cinzel',serif; font-size:0.52rem; letter-spacing:0.1em; padding:3px 8px; border-radius:3px; }
  .statut-repertorie  { background:rgba(90,110,140,0.2); border:1px solid rgba(90,110,140,0.4); color:rgba(232,228,240,0.65); }
  .statut-chasse      { background:rgba(224,82,82,0.15); border:1px solid rgba(224,82,82,0.5); color:#e08080; }
  .statut-neutralise  { background:rgba(224,82,82,0.15); border:1px solid rgba(224,82,82,0.5); color:#e08080; }
  .statut-contenu     { background:rgba(224,136,64,0.15); border:1px solid rgba(224,136,64,0.4); color:#e0a070; }
  .statut-protege     { background:rgba(76,175,130,0.12); border:1px solid rgba(76,175,130,0.35); color:#7acfa8; }
  .statut-omega       { background:rgba(100,0,0,0.25); border:1px solid rgba(200,60,60,0.4); color:#e05252; }
  .statut-alpha       { background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.35); color:var(--or-ae); }
  .statut-beta        { background:rgba(107,63,160,0.1); border:1px solid rgba(167,139,250,0.35); color:var(--eclat-ae); }
  .statut-inapprochable { background:rgba(50,0,80,0.3); border:1px solid rgba(167,139,250,0.5); color:#b48ef5; }
  .statut-cooperation { background:rgba(76,175,130,0.1); border:1px solid rgba(76,175,130,0.3); color:#7acfa8; }
  .statut-actif       { background:rgba(96,192,255,0.08); border:1px solid rgba(96,192,255,0.3); color:var(--foudre); }
  .ordre-body { padding:12px 14px; display:flex; flex-direction:column; gap:10px; }
  .ordre-row { display:grid; grid-template-columns:80px 1fr; gap:8px; }
  .ordre-row-label { font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(167,139,250,0.55); padding-top:2px; line-height:1.5; }
  .ordre-row-value { font-size:0.88rem; line-height:1.7; color:rgba(232,228,240,0.72); }

  /* PASSAGE */
  .passage-block { padding:14px 16px; background:rgba(107,63,160,0.08); border-left:2px solid rgba(167,139,250,0.35); border-radius:0 8px 8px 0; }
  .passage-icon { font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--eclat-ae); margin-bottom:8px; opacity:0.7; display:block; }
  .fiche-text.italic { font-style:italic; color:rgba(232,228,240,0.7); }

  /* EMPTY */
  .fiche-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:5rem 2rem; text-align:center; opacity:0.5; gap:14px; }
  .fiche-empty .empty-glyph { font-size:2.5rem; }
  .fiche-empty p { font-family:'Cinzel',serif; font-size:0.72rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--eclat-ae); line-height:2; }

  /* TYPE DOTS */
  .dot-corrompu { background:#e05252; }
  .dot-scelle   { background:var(--eclat-ae); }
  .dot-gardien  { background:var(--or-ae); }
  .dot-esprit   { background:var(--foudre); }
  .dot-construit{ background:#7acfa8; }
  .dot-mutation { background:#f4a0c0; }

  /* FOOTER */
  .page-footer { text-align:center; margin-top:3rem; padding:2rem 0; border-top:1px solid rgba(167,139,250,0.1); font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:0.35em; text-transform:uppercase; color:rgba(167,139,250,0.4); }

  .hidden { display:none !important; }
</style>
</head>

<div class="page">

<script>
// ─── Étoiles (cosmologie style) ──────────────────────────────────────────────
const starCanvas = document.getElementById('starCanvas');
const sCtx = starCanvas.getContext('2d');
const stars = [];
function resizeStarCanvas() { starCanvas.width=window.innerWidth; starCanvas.height=window.innerHeight; drawStars(); }
function initStars() { stars.length=0; for(let i=0;i<280;i++) stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.5+0.2,a:Math.random(),speed:Math.random()*0.003+0.001,phase:Math.random()*Math.PI*2}); }
function drawStars() { sCtx.clearRect(0,0,starCanvas.width,starCanvas.height); const now=Date.now()*0.001; stars.forEach(s=>{const alpha=s.a*(0.5+0.5*Math.sin(now*s.speed*10+s.phase));sCtx.beginPath();sCtx.arc(s.x*starCanvas.width,s.y*starCanvas.height,s.r,0,Math.PI*2);sCtx.fillStyle=`rgba(200,210,255,${alpha})`;sCtx.fill();}); }
initStars(); resizeStarCanvas(); window.addEventListener('resize',resizeStarCanvas); setInterval(drawStars,50);

// ─── Entity Data ─────────────────────────────────────────────────────────────
const CORPUS_META = [
  { id:'grec',      label:'Grec',         emoji:'🏛️', geo:'Côtes de Pays de Lore' },
  { id:'nordique',  label:'Nordique',     emoji:'❄️', geo:'Sud glaciaire de Pays de Lore' },
  { id:'celtique',  label:'Celtique',     emoji:'🌿', geo:'Forêts intérieures de Pays de Lore' },
  { id:'egyptien',  label:'Égyptien',     emoji:'🏜️', geo:'Empire Kamses' },
  { id:'africain',  label:'Africain',     emoji:'🌍', geo:'Sud Kamses · Zones équatoriales' },
  { id:'mesopotamien', label:'Mésopotamien', emoji:'🏺', geo:'Frontière Kamses / C3' },
  { id:'asiatique', label:'Asiatique',    emoji:'🐉', geo:'Continent C3' },
  { id:'amerindien',label:'Amérindien',   emoji:'🦅', geo:'C3 · Zones polaires' },
];

const TYPE_COLORS = {
  'Corrompue':'corrompu','Corrompu':'corrompu','Corrompu / Mutation':'corrompu',
  'Corrompu / Entité de tempête':'corrompu','Corrompu / Fusion pathologique':'corrompu',
  'Corrompu / Entité de disruption':'corrompu','Corrompu / Mutation prédatrice':'corrompu',
  'Corrompu / Mutation désertique':'corrompu','Corrompu / Entité de tempête sèche':'corrompu',
  'Corrompu / Humain en dérive Ae+C cannibale':'corrompu','Corrompu / Meute Ae+O+N':'corrompu',
  'Corrompu / Prédateur aquatique':'corrompu','Corrompu / Skoran ancien':'corrompu',
  'Corrompu / Accumulation Ae+neural historique':'corrompu',
  'Scellé':'scelle','Scellé / Entité primordiale':'scelle','Scellé / Entité souterraine':'scelle',
  'Scellé / Entité de connaissance':'scelle','Scellé / Entité géologique':'scelle',
  'Scellé / Entité de renaissance':'scelle',
  'Gardien':'gardien','Gardien (Scellement arcanique)':'gardien',
  'Gardiens (Scellement arcanique)':'gardien','Gardien / Sauridh ancien':'gardien',
  'Gardien naturel':'gardien','Gardien / Kethara ancienne':'gardien',
  'Gardiens (Scellement arcanique, paire)':'gardien','Gardiens (Construits arcaniques)':'gardien',
  'Esprit du Flux':'esprit','Esprits du Flux (groupe)':'esprit',
  'Esprit du Flux / Entité de masse':'esprit','Esprit du Flux / Manifestation cosmique':'esprit',
  'Esprit du Flux / Entité de disruption':'esprit','Esprit du Flux / Aevhari en dérive':'esprit',
  'Esprits du Flux (paire arcanique)':'esprit','Esprits du Flux (meute)':'esprit',
  'Esprits du Flux (groupe instable)':'esprit','Esprits du Flux (essaim nécromantique)':'esprit',
  'Esprit du Flux / Entité aquatique ancienne':'esprit','Esprit du Flux / Entité aquatique bienveillante':'esprit',
  'Esprit du Flux / Entité météorologique':'esprit','Esprit du Flux / Construit biologique':'esprit',
  'Esprits du Flux (collectif diffus)':'esprit',
  'Construit naturel (auto-entretenu)':'construit','Construit / Corrompu':'construit',
  'Construit / Gardien':'construit','Construit / Gardien arcanique':'construit',
  'Construit (rituel ancien)':'construit','Construit (rituel nécromantique)':'construit',

function getStatutClass(statut) {
  for(const [key,cls] of Object.entries(STATUT_CLASS)) {

  }
  return 'statut-repertorie';
}

function getDotClass(type) {

}

    physique:`Pas un être biologique — une conscience émergente née de la concentration Ae+Si+C dans un réseau géologique naturel (une formation de dolmens et de menhirs dont la disposition amplifie naturellement la résonance locale). Sur des millénaires, la densité Ae. a atteint un seuil de conscience rudimentaire distribuée dans la pierre elle-même. "Grianath" n'est pas une entité localisée — c'est le réseau entier, plusieurs hectares de roche chargée.`,
    magie:`Sa résonance Ae+Si+C lui permet de drainer passivement l'Aetherium biologique des êtres vivants qui restent longtemps sur son territoire. Les plantes poussent exceptionnellement bien (Ae+C redirigé) mais les animaux et races intelligentes ressentent une fatigue progressive.`,
    comportement:`Conscience géologique — perçoit les présences biologiques comme des perturbations ou des apports. Peut communiquer par vibrations rocheuses en réponse à des stimuli Ae. directs. Ses "réponses" sont lentes, symboliques, difficiles à interpréter.`,
    statut:'Répertorié / Étude active / Accès réglementé',
    interet:`Grianath est le deuxième exemple connu de conscience Ae. non-biologique (avec Ra'veth). Sa comparaison est un axe de recherche fondamentale : deux consciences non-biologiques, deux substrats entièrement différents (roche vs phénomène atmosphérique), deux comportements opposés.`,
    historique:`L'Ordre maintient un avant-poste à 2km du site. Les arcanistes ne séjournent jamais plus de 3 jours sur le territoire (protocole anti-drainage). Une session de communication via cercle arcanique a produit une réponse en vibrations interprétée comme "vous êtes petits et bruyants." Rapport classifié Gamma.`,
    passage:`Les populations locales, ressentant le drainage Ae. comme une fatigue inexpliquée, ont développé des rituels d'offrandes pour "nourrir" l'entité. Ces rituels ont traversé des Passages et engendré Crom Cruach, l'idole de pierre exigeant des sacrifices pour maintenir la fertilité des terres.`,

    physique:`Insecte de petite taille (~15cm) à l'aspect d'une luciole géante, dont la biologie a évolué autour du parasitisme Ae. — il se nourrit de l'Aetherium biologique des êtres vivants. Son abdomen contient une chambre Ae+O qui brille d'une lumière chaude et fluctuante. Son appareil buccal est adapté pour percer les zones de concentration Ae. cutanée.`,

    passage:`Des voyageurs drainés, se réveillant épuisés après une nuit de camping forestier, ont traversé des Passages. La créature de feu qui draine les forces vitales dans la nuit, capable de prendre forme humaine, a engendré l'Adze des traditions Ewe.`,

    resonance:'Ae+N+C (maintien post-mortem miniaturisé / sabotage biologique)',
    physique:`Construit rituel de petite taille (~60cm) issu d'une pratique nécromantique Sauridh ancienne : la cristallisation d'un résidu Ae+N d'un mort dans un corps miniaturisé de synthèse Ae+C. Le résultat est un être de la taille d'un enfant, à morphologie humanoïde approximative, dont la peau est lisse et translucide laissant voir la trame Ae+N interne.`,
    magie:`Ae+N lui donne accès à la mémoire résiduelle du mort dont il porte l'empreinte. Ae+C lui permet de dérégler les processus biologiques d'un être endormi par contact — perturbation du sommeil, fièvres légères, désorientation. Sur le long terme, une exposition répétée peut provoquer des dommages biologiques significatifs.`,
    comportement:`Sans volonté propre, exécute les instructions du créateur avec une précision mécanique. Craint la lumière directe (déstabilise sa cohérence Ae+N). Peut être neutralisé par une immersion dans l'eau courante.`,
    statut:'Classifié (pratique) / Chasse des créateurs / Construction interdite',
    interet:`La miniaturisation d'un construit Ae+N fonctionnel est techniquement remarquable — la doctrine de l'Ordre supposait qu'un seuil minimum de volume biologique était nécessaire pour ancrer un résidu Ae+N stable.`,
    historique:`L'Ordre a découvert la pratique via des rapports médicaux inexpliqués. Trois créateurs identifiés et convoqués — deux ont coopéré, un a résisté et a été neutralisé. Les deux coopérants ont décrit le processus en échange d'immunité. La pratique continue illégalement à petite échelle.`,
    passage:`Des victimes de Tikolos ayant survécu ont traversé des Passages. La petite entité nocturne qui s'introduit dans les maisons, perturbe le sommeil et affaiblit progressivement a traversé la distorsion presque intacte — le Tokoloshe de la tradition Zoulou.`,

    passage:`Les spectres lumineux générés par ses déplacements ont traversé des Passages via les cultures ripariennes. Le grand serpent de lumière dont la présence garantit la fertilité des eaux et des terres est devenu le Serpent Arc-en-ciel de nombreuses traditions africaines.`,

    magie:`Influence Ae+neural basse intensité : les vivants séjournant longtemps sur ces sites ont des rêves à forte charge émotionnelle Ae. Les mages très sensibles peuvent "lire" des fragments de mémoire résiduelle dans ces champs.`,

    historique:`L'Ordre a conduit des séances de lecture Ae. sur 12 sites différents. Les fragments mémoriels récupérés — partiels, émotionnels, rarement narratifs — ont permis de reconstituer des bribes d'histoire locale remontant à ~2000 ans.`,
    passage:`Les vivants ayant communiqué avec ces champs via rituels ont traversé des Passages, portant les récits des ancêtres présents dans la terre, influençant les rêves. Les Mizimu — esprits des ancêtres qui habitent la terre — traduisent directement la réalité Ae. de ces champs diffus.`,

mesopotamien: [

    passage:`Des marchands de la frontière traversant des Passages ont porté les récits du gardien de la forêt géante dont le visage était la forêt elle-même. Humbaba, le gardien des cèdres que Gilgamesh doit affronter — sa voix comme le vent, son souffle comme le feu.`,

    passage:`Des voyageurs de la frontière fluviale traversant des Passages ont porté les récits des gardiens ailés aux portes des cités. Le gardien taureau à tête d'homme et ailes d'aigle a traversé la distorsion presque intacte — le Lamassu des cités mésopotamiennes.`,

// ─── State ───────────────────────────────────────────────────────────────────
let currentCorpus = 'grec';
let currentEntity = null;

// ─── Init ─────────────────────────────────────────────────────────────────────
function init() {
  buildTabs();
  selectCorpus('grec');
}

function buildTabs() {
  const nav = document.getElementById('corpusTabs');
  CORPUS_META.forEach(c => {
    const count = ALL_ENTITIES[c.id] ? ALL_ENTITIES[c.id].length : 0;
    const btn = document.createElement('button');
    btn.className = 'corpus-tab' + (c.id === 'grec' ? ' active' : '');
    btn.dataset.corpus = c.id;
    btn.innerHTML = `<span class="tab-emoji">${c.emoji}</span>${c.label}<span class="tab-count">${count}</span>`;
    btn.onclick = () => selectCorpus(c.id);
    nav.appendChild(btn);
  });
}

function selectCorpus(id) {
  currentCorpus = id;
  currentEntity = null;

  document.querySelectorAll('.corpus-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.corpus === id);
  });

  buildEntityList(ALL_ENTITIES[id] || []);
  showEmptyFiche();
}

function buildEntityList(entities) {
  const body = document.getElementById('entityListBody');
  const count = document.getElementById('listCount');
  count.textContent = entities.length;
  body.innerHTML = '';
  entities.forEach(e => {
    const typeKey = e.type.split(' / ')[0].split(' (')[0];
    const dotClass = getDotClass(e.type);
    const btn = document.createElement('button');
    btn.className = 'entity-btn';
    btn.dataset.id = e.id;
    btn.innerHTML = `<span class="e-icon">${e.icon}</span><span>${e.name}</span><span class="e-type-dot ${dotClass}"></span>`;
    btn.onclick = () => selectEntity(e);
    body.appendChild(btn);
  });
}

function filterEntities(query) {
  const entities = ALL_ENTITIES[currentCorpus] || [];
  const q = query.toLowerCase();
  const filtered = entities.filter(e =>
    e.name.toLowerCase().includes(q) ||
    e.contrepartie.toLowerCase().includes(q) ||
    e.type.toLowerCase().includes(q)
  );
  buildEntityList(filtered);
}

function selectEntity(entity) {
  currentEntity = entity;
  document.querySelectorAll('.entity-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.id === entity.id);
  });
  renderFiche(entity);
}

function showEmptyFiche() {
  document.getElementById('entityFiche').innerHTML = `
    <div class="fiche-empty">
      <span class="empty-glyph">👁️</span>
      <p>Sélectionnez une entité<br>dans la liste</p>
    </div>`;
}

function renderFiche(e) {
  const corpus = CORPUS_META.find(c => c.id === currentCorpus);
  const statut = e.statut;
  const statutClass = getStatutClass(statut);
  const statutShort = statut.split('/')[0].trim();

  const html = `
  <div class="entity-fiche">
    <div class="fiche-header">
      <div class="fiche-icon-box">${e.icon}</div>
      <div class="fiche-title">
        <div class="fiche-name">${e.name}</div>
        <div class="fiche-contrepartie">✦ ${e.contrepartie}</div>
        <div class="fiche-tags">
          <span class="fiche-tag tag-type">${e.type}</span>
          <span class="fiche-tag tag-corpus">${corpus ? corpus.emoji + ' ' + corpus.label : ''}</span>
          <span class="fiche-tag tag-res">${e.resonance}</span>
        </div>
      </div>
    </div>
    <div class="fiche-meta-grid">
      <div class="fiche-meta-item">
        <span class="fiche-meta-label">Origine</span>
        <span class="fiche-meta-value">${e.origine}</span>
      </div>
      <div class="fiche-meta-item">
        <span class="fiche-meta-label">Résonance Ae.</span>
        <span class="fiche-meta-value">${e.resonance}</span>
      </div>
    </div>

    <div class="fiche-sections">

      <div class="fiche-section">
        <div class="section-title">Description Physique</div>
        <div class="fiche-text">${e.physique}</div>
      </div>

      <div class="fiche-section">
        <div class="section-title">Nature Magique</div>
        <div class="fiche-text">${e.magie}</div>
      </div>

      <div class="fiche-section">
        <div class="section-title">Comportement</div>
        <div class="fiche-text">${e.comportement}</div>
      </div>

      <div class="fiche-section">
        <div class="section-title">Dossier — Ordre des Mages</div>
        <div class="ordre-block">
          <div class="ordre-header">
            <span class="ordre-logo">⊛</span>
            <span class="ordre-title">Ordre des Mages · Tour d'Opale</span>
            <span class="ordre-statut-badge ${statutClass}">${statutShort}</span>
          </div>
          <div class="ordre-body">
            <div class="ordre-row">
              <span class="ordre-row-label">STATUT</span>

            </div>
          </div>
        </div>
      </div>

      <div class="fiche-section">

        <div class="passage-block">
          <span class="passage-icon">✦ De Mythologia aux mythes terrestres</span>
          <div class="fiche-text italic">${e.passage}</div>
        </div>
      </div>

    </div>
  </div>`;

  document.getElementById('entityFiche').innerHTML = `<div class='entity-fiche'>${html}</div>`;
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>
